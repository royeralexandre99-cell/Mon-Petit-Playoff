// Vainqueur : cote × 10, arrondi (ex: 1.40→14, 2.60→26, 1.87→19)
const calcWinPts=(odds,mult=1)=>Math.round(odds*10)*mult;
// Scoreur : selon rang dans l'équipe
const calcScorerPts=(rang,mult=1)=>{
  if(rang===1)return 10*mult;
  if(rang<=3)return 20*mult;
  if(rang<=6)return 30*mult;
  return 40*mult;
};

// Badge équipe avec couleurs officielles
function TeamBadge({code,size=42,showName=false,showSeed=false}){
  const t=TEAMS[code];if(!t)return null;
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
      <div style={{width:size,height:size,borderRadius:size*.22,
        background:`linear-gradient(135deg,${t.c1},${t.c1}cc)`,
        border:`2px solid ${t.c2}44`,
        display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
        boxShadow:`0 2px 8px ${t.c1}40`,flexShrink:0}}>
        <div style={{fontSize:size*.26,fontWeight:900,color:t.c2,
          fontFamily:'Space Grotesk,sans-serif',lineHeight:1,letterSpacing:-.5}}>{t.abbr}</div>
      </div>
      {showName&&<div style={{fontSize:10,color:'var(--tx2)',fontWeight:600,textAlign:'center',whiteSpace:'nowrap'}}>
        {t.city}

      {showSeed&&<div style={{fontSize:9,color:'var(--tx3)',fontWeight:600}}>
        #{t.conf==='Est'?t.seed_e:t.seed_w} {t.conf}
      </div>}
    </div>
  );

// Résultat d'un pick
function computeResult(game,pick){
  if(!pick||game.status!=='finished')return{pts:0,win_ok:false,scorer_ok:false};
  const win_ok=pick.winner===game.winner;
  const scorer_ok=pick.scorer&&pick.scorer===game.top_scorer;
  let pts=0;
  if(win_ok){const o=pick.winner===game.home?game.home_odds:game.away_odds;pts+=calcWinPts(o);}
  if(scorer_ok){const p=PLAYERS.find(x=>x.id===pick.scorer);pts+=calcScorerPts(p?.rang||6);}
  return{pts,win_ok,scorer_ok};
}

function Toast({msg,onDone}){
  useEffect(()=>{const t=setTimeout(onDone,2000);return()=>clearTimeout(t)},[]);
  return(
    <div style={{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',
      background:'var(--c)',border:'1px solid var(--bd2)',borderRadius:999,
      padding:'9px 18px',zIndex:9999,display:'flex',alignItems:'center',gap:8,
      boxShadow:'0 8px 24px rgba(0,0,0,.6)',animation:'slideUp .22s ease both',whiteSpace:'nowrap'}}>
      ✅ <span style={{fontSize:13,fontWeight:600}}>{msg}</span>
    </div>
  );
}

function HomePage({picks,setPage,user,championPick,setChampionPick,toast,setDetailGame,setPickGame}){
  const liveGames=ALL_GAMES.filter(g=>g.status==='live');
  const upcomingGames=ALL_GAMES.filter(g=>g.status==='upcoming').sort((a,b)=>{
    const da=a.date+(a.time||'99:99');
    const db=b.date+(b.time||'99:99');
    return da<db?-1:da>db?1:0;
  });
  const pendingCount=upcomingGames.filter(g=>!picks[g.id]).length;
  const playoffsStarted=ALL_GAMES.some(g=>g.status==='finished'||g.status==='live');

  return(
    <div style={{padding:'18px 15px 88px'}} className="fi">
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
        <div>
          <div style={{fontSize:11,color:'var(--tx3)',fontWeight:600,letterSpacing:.5}}>SALUT 👋</div>
          <div className="grot" style={{fontSize:21,fontWeight:700}}>{user?.name}</div>
          <div style={{fontSize:12,color:'var(--tx2)',marginTop:1}}>Playoffs NBA 2025 · 1er tour</div>
        </div>
        <Avi ini={(user?.name||'?').slice(0,2).toUpperCase()} color="var(--o)" size={40} ring/>
      </div>

      {/* Champion pick — verrouillé dès le 1er match */}
      {!championPick&&!playoffsStarted&&(
        <button onClick={()=>setPage('profile')} style={{
          width:'100%',background:'linear-gradient(135deg,#1c0b00,#1a1a1a)',
          border:'1px solid rgba(255,92,26,.35)',borderRadius:'var(--rad)',
          padding:'12px 15px',marginBottom:13,cursor:'pointer',
          display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:22}}>🏅</span>
            <div style={{textAlign:'left'}}>
              <div style={{fontSize:13,fontWeight:700,color:'var(--o)'}}>Choisis ton champion NBA</div>
              <div style={{fontSize:11,color:'var(--tx2)'}}>+50 pts · Verrouillé au 1er match</div>
            </div>
          </div>
          <span style={{color:'var(--o)',fontSize:18}}>→</span>
        </button>
      )}
      {championPick&&(
        <div style={{background:'rgba(245,158,11,.06)',border:'1px solid rgba(245,158,11,.2)',
          borderRadius:'var(--rad)',padding:'11px 14px',marginBottom:13,
          display:'flex',alignItems:'center',gap:10}}>
          <TeamBadge code={championPick} size={34}/>
          <div>
            <div style={{fontSize:11,color:'var(--gold)',fontWeight:700,marginBottom:1}}>🏅 MON CHAMPION</div>
            <div style={{fontSize:13,fontWeight:700}}>{TEAMS[championPick]?.city} {TEAMS[championPick]?.name}</div>
            {playoffsStarted&&<div style={{fontSize:10,color:'var(--tx3)',marginTop:2}}>🔒 Verrouillé</div>}
          </div>
        </div>
      )}

      {/* Alerte pronos manquants */}
      {pendingCount>0&&(
        <button onClick={()=>setPage('matches')} style={{
          width:'100%',background:'var(--ob2)',border:'1px solid rgba(255,92,26,.3)',
          borderRadius:'var(--rad)',padding:'11px 14px',marginBottom:13,
          display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}}>
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            <span style={{fontSize:20}}>⚠️</span>
            <div style={{textAlign:'left'}}>
              <div style={{fontSize:13,fontWeight:700,color:'var(--o)'}}>{pendingCount} prono{pendingCount>1?'s':''} en attente</div>
              <div style={{fontSize:11,color:'var(--tx2)'}}>
                {upcomingGames.length} match{upcomingGames.length>1?'s':''} à pronostiquer
              </div>
            </div>
          </div>
          <span style={{color:'var(--o)',fontSize:18}}>→</span>
        </button>
      )}

      {/* Matchs en direct — cliquables pour voir les pronos de la ligue */}
      {liveGames.length>0&&(
        <div style={{marginBottom:14}}>
          <SecLabel><span style={{display:'inline-flex',alignItems:'center',gap:5}}><LiveDot/> En direct · Tap pour voir les pronos</span></SecLabel>
          {liveGames.map(g=>(
            <LiveCard key={g.id} game={g} pick={picks[g.id]}
              onClick={()=>{setDetailGame(g.id);setPage('matches');}}/>
          ))}
        </div>
      )}

      {/* Tous les matchs à venir */}
      {upcomingGames.length>0?(
        <div>
          <SecLabel>Matchs à pronostiquer ({upcomingGames.length})</SecLabel>

            <UpcomingMiniCard key={g.id} game={g} pick={picks[g.id]} onClick={()=>setPickGame(g.id)}/>

  const hT=TEAMS[game.home],aT=TEAMS[game.away];
  const hWin=game.hs>game.as;
  return(
    <Card style={{marginBottom:9,borderColor:'rgba(239,68,68,.25)',background:'#130808',cursor:'pointer'}} onClick={onClick}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:9}}>
        <div>
          <div style={{fontSize:10,fontWeight:600,color:'var(--tx2)'}}>{game.series?.round} · Match {game.game_num}</div>
          <div style={{fontSize:9,color:'var(--tx3)',marginTop:1}}>
            {TEAMS[game.series?.team1]?.name} {game.series?.wins1}–{game.series?.wins2} {TEAMS[game.series?.team2]?.name}
          </div>
        </div>
        <div style={{display:'flex',gap:5,alignItems:'center'}}>
          <Pill color='var(--r)'><LiveDot/> {game.period}</Pill>
          <span style={{fontSize:11,color:'var(--tx3)'}}>Voir pronos →</span>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div style={{flex:1,display:'flex',alignItems:'center',gap:8}}>
          <TeamBadge code={game.home} size={36}/>
          <div>
            <div style={{fontWeight:700,fontSize:12}}>{hT?.name}</div>
            <div style={{fontSize:10,color:'var(--tx2)'}}>Cote {game.home_odds}</div>
          </div>
        </div>
        <div className="grot" style={{fontWeight:700,fontSize:26,display:'flex',gap:4,textAlign:'center'}}>
          <span style={{color:hWin?'var(--tx)':'var(--tx3)'}}>{game.hs}</span>
          <span style={{color:'var(--tx3)'}}>—</span>
          <span style={{color:!hWin?'var(--tx)':'var(--tx3)'}}>{game.as}</span>
        </div>
        <div style={{flex:1,display:'flex',alignItems:'center',gap:8,justifyContent:'flex-end'}}>
          <div style={{textAlign:'right'}}>
            <div style={{fontWeight:700,fontSize:12}}>{aT?.name}</div>
            <div style={{fontSize:10,color:'var(--tx2)'}}>Cote {game.away_odds}</div>
          </div>
          <TeamBadge code={game.away} size={36}/>
        </div>
      </div>
      {pick&&(
        <>
          <Divider m='9px 0'/>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:12,color:'var(--tx2)'}}>
              Mon prono : <b style={{color:'var(--tx)'}}>{TEAMS[pick.winner]?.name}</b>
              {pick.scorer&&<> · <b style={{color:'var(--tx)'}}>{PLAYERS.find(p=>p.id===pick.scorer)?.short}</b></>}
            </span>
            <span style={{fontSize:12,color:'var(--o)',fontWeight:700}}>
              +{calcWinPts(pick.winner===game.home?game.home_odds:game.away_odds)+(pick.scorer?calcScorerPts(PLAYERS.find(p=>p.id===pick.scorer)?.rang||6):0)} pts pot.
            </span>
          </div>
        </>
      )}
    </Card>
  );
}

/* ════════════════════════════════════════
   MATCHES PAGE
════════════════════════════════════════ */
function MatchesPage({picks,setPicks,toast,defaultDetail,clearDefaultDetail,defaultPickGame,clearDefaultPickGame}){
  const [selDate,setSelDate]=useState(()=>{
    const liveDate=ALL_GAMES.find(g=>g.status==='live')?.date;
    const upcomingDate=ALL_GAMES.find(g=>g.status==='upcoming')?.date;
    return liveDate||upcomingDate||ALL_DATES[ALL_DATES.length-1];
  });
  const [pickGame,setPickGame]=useState(defaultPickGame||null);
  const [detailGame,setDetailGame]=useState(defaultDetail||null);
  const dateRef=useRef(null);

  useEffect(()=>{
    if(defaultDetail){clearDefaultDetail();}
    if(defaultPickGame){clearDefaultPickGame();}
  },[]);

  useEffect(()=>{
    const el=dateRef.current?.querySelector(`[data-date="${selDate}"]`);
    if(el)el.scrollIntoView({inline:'center',block:'nearest',behavior:'smooth'});
  },[selDate]);

  const game=ALL_GAMES.find(g=>g.id===pickGame);
  if(game)return(
    <PickForm game={game} pick={picks[game.id]}
      onSave={(p)=>{
        setPicks(pr=>({...pr,[game.id]:p}));
        toast('Pronostic enregistré ✓');
        setPickGame(null);
      }}
      onBack={()=>setPickGame(null)}/>
  );

  if(detailGame){
    const dg=ALL_GAMES.find(g=>g.id===detailGame);
    if(dg) return <MatchDetail game={dg} pick={picks[dg.id]} onBack={()=>setDetailGame(null)}/>;
  }

  const dayGames=GAMES_BY_DATE[selDate]||[];

  return(
    <div style={{padding:'18px 0 88px'}} className="fi">
      <div style={{padding:'0 15px',marginBottom:12}}>
        <div className="grot" style={{fontSize:21,fontWeight:700,marginBottom:1}}>🗓️ Matchs</div>
        <div style={{fontSize:12,color:'var(--tx2)'}}>1er tour Playoffs NBA 2025</div>
      </div>
      <div ref={dateRef} style={{display:'flex',gap:6,overflowX:'auto',padding:'0 15px 11px',
        WebkitOverflowScrolling:'touch',msOverflowStyle:'none',scrollbarWidth:'none'}}>
        {ALL_DATES.map(d=>{
          const dGames=GAMES_BY_DATE[d]||[];
          const hasLive=dGames.some(g=>g.status==='live');
          const hasPending=dGames.some(g=>g.status==='upcoming'&&!picks[g.id]);
          const sel=selDate===d;
          const dt=new Date(d+'T12:00:00');
          return(
            <button key={d} data-date={d} onClick={()=>setSelDate(d)} style={{
              flexShrink:0,padding:'6px 11px',borderRadius:'var(--rads)',
              border:`1.5px solid ${sel?'var(--o)':'var(--bd)'}`,
              background:sel?'var(--ob)':'var(--c)',
              color:sel?'var(--o)':'var(--tx2)',fontSize:12,fontWeight:sel?700:500,
              transition:'all .15s',position:'relative'}}>
              {dt.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})}
              {hasLive&&<span style={{position:'absolute',top:2,right:2,width:5,height:5,borderRadius:'50%',background:'var(--r)'}}/>}
              {!hasLive&&hasPending&&<span style={{position:'absolute',top:2,right:2,width:5,height:5,borderRadius:'50%',background:'var(--o)'}}/>}
            </button>
          );
        })}
      </div>
      <div style={{padding:'0 15px'}}>
        {dayGames.map(g=>(
          <MatchDayCard key={g.id} game={g} pick={picks[g.id]}
            onPick={()=>setPickGame(g.id)}
            onDetail={()=>setDetailGame(g.id)}/>
        ))}
        {dayGames.length===0&&<div style={{textAlign:'center',padding:40,color:'var(--tx3)'}}>Aucun match ce jour</div>}
      </div>
    </div>
  );
}


function MatchDayCard({game,pick,onPick,onDetail}){
  const hT=TEAMS[game.home],aT=TEAMS[game.away];
  const res=pick?computeResult(game,pick):null;
  const isDone=game.status==='finished';
  const isLive=game.status==='live';
  const clickable=isDone||isLive;
  return(
    <Card style={{marginBottom:9,
      borderColor:isLive?'rgba(239,68,68,.25)':'var(--bd)',
      background:isLive?'#130808':'var(--c)'}}
      onClick={clickable?onDetail:undefined}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:9}}>
        <div>
          <div style={{fontSize:10,fontWeight:600,color:'var(--tx2)'}}>
            {game.series?.round} · Match {game.game_num}
          </div>
          <div style={{fontSize:9,color:'var(--tx3)',marginTop:1}}>
            {TEAMS[game.series?.team1]?.name} {game.series?.wins1}–{game.series?.wins2} {TEAMS[game.series?.team2]?.name}
          </div>
        </div>
        <div style={{display:'flex',gap:5,alignItems:'center'}}>
          {!isDone&&!isLive&&game.time&&<span style={{fontSize:10,color:'var(--tx3)',fontWeight:600}}>{game.time}</span>}
          {isLive&&<Pill color='var(--r)'><LiveDot/> {game.period}</Pill>}
          {isLive&&<span style={{fontSize:10,color:'var(--tx3)'}}>Pronos →</span>}
          {isDone&&res&&<span style={{fontSize:13,fontWeight:700,
            color:res.pts>0?'var(--g)':pick?'var(--r)':'var(--tx3)'}}>
            {pick?(res.pts>0?`+${res.pts} pts`:'0 pt'):'—'}
          </span>}
          {isDone&&<span style={{fontSize:10,color:'var(--tx3)'}}>Ligue →</span>}
          {!isDone&&!isLive&&(pick?<Pill color='var(--g)'>✓ Modif.</Pill>:<Pill color='var(--o)'>Pronostiquer →</Pill>)}
        </div>
      </div>
      {(isDone||isLive)?(
        <div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:6}}>
            <div style={{display:'flex',alignItems:'center',gap:7,flex:1}}>
              <TeamBadge code={game.home} size={34}/>
              <div>
                <div style={{fontSize:12,fontWeight:isDone&&game.winner===game.home?700:500,
                  color:isDone&&game.winner===game.home?'var(--tx)':'var(--tx2)'}}>{hT?.name}</div>
                {isDone&&<div style={{fontSize:9,color:'var(--tx3)'}}>Cote {game.home_odds}</div>}
              </div>
            </div>
            <div className="grot" style={{fontWeight:700,fontSize:22,display:'flex',gap:4}}>
              <span style={{color:isDone?(game.winner===game.home?'var(--g)':'var(--tx3)'):(game.hs>game.as?'var(--tx)':'var(--tx3)')}}>{game.hs}</span>
              <span style={{color:'var(--tx3)'}}>—</span>
              <span style={{color:isDone?(game.winner===game.away?'var(--g)':'var(--tx3)'):(game.as>game.hs?'var(--tx)':'var(--tx3)')}}>{game.as}</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:7,flex:1,justifyContent:'flex-end'}}>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:12,fontWeight:isDone&&game.winner===game.away?700:500,
                  color:isDone&&game.winner===game.away?'var(--tx)':'var(--tx2)'}}>{aT?.name}</div>
                {isDone&&<div style={{fontSize:9,color:'var(--tx3)'}}>Cote {game.away_odds}</div>}
              </div>
              <TeamBadge code={game.away} size={34}/>
            </div>
          </div>
          {isDone&&game.top_scorer&&(
            <div style={{marginTop:7,padding:'5px 9px',background:'var(--dk2)',borderRadius:'var(--radxs)',
              display:'flex',alignItems:'center',gap:6}}>
              <span style={{fontSize:10,color:'var(--tx3)'}}>🏀 Top scoreur</span>
              <span style={{fontSize:11,fontWeight:700,color:'var(--gold)'}}>
                {PLAYERS.find(p=>p.id===game.top_scorer)?.name} · {game.top_pts} pts
              </span>
            </div>
          )}
          {pick&&isDone&&(
            <div style={{marginTop:7,display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}}>
              <OkBadge ok={res.win_ok}/>
              <span style={{fontSize:11,color:'var(--tx2)'}}>{TEAMS[pick.winner]?.name}</span>
              {pick.scorer&&<><OkBadge ok={res.scorer_ok}/>
                <span style={{fontSize:11,color:'var(--tx2)'}}>{PLAYERS.find(p=>p.id===pick.scorer)?.short}</span>
              </>}
            </div>
          )}
        </div>
      ):(
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:6}}>
            <div style={{display:'flex',alignItems:'center',gap:7,flex:1}}>
              <TeamBadge code={game.home} size={34}/>
              <div>
                <div style={{fontSize:12,fontWeight:500}}>{hT?.name}</div>
                <div style={{fontSize:10,color:'var(--tx2)'}}>Cote {game.home_odds} → <b style={{color:'var(--o)'}}>{calcWinPts(game.home_odds)} pts</b></div>
              </div>
            </div>
            <span style={{color:'var(--tx3)',fontWeight:700,fontSize:11}}>VS</span>
            <div style={{display:'flex',alignItems:'center',gap:7,flex:1,justifyContent:'flex-end',flexDirection:'row-reverse'}}>
              <TeamBadge code={game.away} size={34}/>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:12,fontWeight:500}}>{aT?.name}</div>
                <div style={{fontSize:10,color:'var(--tx2)'}}><b style={{color:'var(--o)'}}>{calcWinPts(game.away_odds)} pts</b> ← Cote {game.away_odds}</div>
              </div>
            </div>
          </div>
          {pick&&(
            <div style={{marginTop:8,display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}}>
              <span style={{fontSize:11,color:'var(--tx3)'}}>Prono :</span>
              <span style={{fontSize:11,fontWeight:700,padding:'1px 6px',background:'var(--ob)',color:'var(--o)',borderRadius:5}}>{TEAMS[pick.winner]?.name}</span>
              {pick.scorer&&<span style={{fontSize:11,fontWeight:700,padding:'1px 6px',background:'var(--blb)',color:'var(--bl)',borderRadius:5}}>{PLAYERS.find(p=>p.id===pick.scorer)?.short}</span>}
            </div>
          )}
          <button onClick={e=>{e.stopPropagation();onPick();}} style={{
            marginTop:8,width:'100%',padding:'8px 0',borderRadius:'var(--rads)',
            background:pick?'var(--bd)':'var(--ob)',border:`1px solid ${pick?'var(--bd)':'rgba(255,92,26,.3)'}`,
            color:pick?'var(--tx2)':'var(--o)',fontSize:12,fontWeight:700}}>
            {pick?'Modifier le pronostic':'Pronostiquer ce match'}
          </button>
        </div>
      )}
    </Card>
  );
}

/* ════════════════════════════════════════
   MATCH DETAIL — pronos de la ligue (terminé ou en cours)
════════════════════════════════════════ */
function MatchDetail({game,pick,onBack}){
  const isDone=game.status==='finished';
  const isLive=game.status==='live';

  const memberPicks=MEMBERS.map(m=>{
    const pk=m.id==='me'?pick:(OTHERS_PICKS[m.id]||{})[game.id];
    const res=pk?computeResult(game,pk):{pts:0,win_ok:false,scorer_ok:false};
    return{...m,pick:pk,res};
  });

  return(
    <div style={{padding:'16px 15px 88px'}} className="fi">
      <button onClick={onBack} style={{color:'var(--tx2)',marginBottom:14,fontSize:14,display:'flex',alignItems:'center',gap:5}}>
        ← Retour
      </button>
      <Card style={{marginBottom:14,textAlign:'center'}}>
        <div style={{fontSize:10,fontWeight:600,color:'var(--tx2)',marginBottom:10,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          {game.series?.round} · {game.game}
          {isLive&&<span style={{display:'inline-flex',alignItems:'center',gap:4}}><LiveDot/><span style={{color:'var(--r)',fontSize:10,fontWeight:700}}>{game.period}</span></span>}
        </div>
        <div style={{display:'flex',justifyContent:'space-around',alignItems:'center',gap:6}}>
          {[game.home,game.away].map((code,i)=>(
            <React.Fragment key={code}>
              {i===1&&(
                <div style={{textAlign:'center',minWidth:80}}>
                  {(isDone||isLive)&&<div className="grot" style={{fontWeight:700,fontSize:28,display:'flex',gap:5,justifyContent:'center'}}>
                    <span style={{color:isDone&&game.winner===game.home?'var(--g)':isLive&&game.hs>game.as?'var(--tx)':'var(--tx3)'}}>{game.hs}</span>
                    <span style={{color:'var(--tx3)'}}>—</span>
                    <span style={{color:isDone&&game.winner===game.away?'var(--g)':isLive&&game.as>game.hs?'var(--tx)':'var(--tx3)'}}>{game.as}</span>
                  </div>}
                  {!isDone&&!isLive&&<div style={{color:'var(--tx3)',fontWeight:700,fontSize:16}}>VS</div>}
                  {isDone&&game.top_scorer&&<div style={{marginTop:5,fontSize:10,color:'var(--gold)',fontWeight:700}}>
                    🏀 {PLAYERS.find(p=>p.id===game.top_scorer)?.short} · {game.top_pts} pts
                  </div>}
                </div>
              )}
              <div style={{flex:1,textAlign:'center'}}>
                <div style={{display:'flex',justifyContent:'center',marginBottom:5}}><TeamBadge code={code} size={44}/></div>
                <div style={{fontWeight:700,fontSize:13,color:isDone&&game.winner===code?'var(--g)':'var(--tx)'}}>{TEAMS[code]?.city}</div>
                {isDone&&game.winner===code&&<div style={{fontSize:10,color:'var(--g)',fontWeight:700}}>✓ VAINQUEUR</div>}
              </div>
            </React.Fragment>
          ))}
        </div>
      </Card>

      <SecLabel>Pronos de la ligue</SecLabel>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        {memberPicks.map(m=>{
          const isMe=m.id==='me';
          return(
            <Card key={m.id} style={{borderColor:isMe?'rgba(255,92,26,.25)':'var(--bd)',background:isMe?'rgba(255,92,26,.04)':'var(--c)'}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:m.pick?9:0}}>
                <Avi ini={m.avatar} color={m.color} size={32}/>
                <div style={{flex:1}}>
                  <div style={{display:'flex',alignItems:'center',gap:5}}>
                    <span style={{fontWeight:isMe?700:600,fontSize:13}}>{m.name}</span>
                    {isMe&&<Pill color='var(--o)' style={{fontSize:9,padding:'1px 5px'}}>Moi</Pill>}
                  </div>
                  {!m.pick&&<div style={{fontSize:11,color:'var(--tx3)',marginTop:1}}>Pas de pronostic</div>}
                </div>
                {m.pick&&isDone&&<span className="grot" style={{fontSize:18,fontWeight:700,color:m.res.pts>0?'var(--g)':'var(--r)'}}>{m.res.pts>0?`+${m.res.pts}`:'0'}</span>}
              </div>
              {m.pick&&(
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,padding:'6px 10px',borderRadius:'var(--rads)',flex:1,
                    background:isDone?(m.res.win_ok?'var(--gb)':'var(--rb)'):'var(--dk2)',
                    border:`1px solid ${isDone?(m.res.win_ok?'rgba(34,197,94,.2)':'rgba(239,68,68,.2)'):'var(--bd)'}`}}>
                    <TeamBadge code={m.pick.winner} size={24}/>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11,fontWeight:700}}>{TEAMS[m.pick.winner]?.name}</div>
                      {isDone&&<div style={{fontSize:10,color:m.res.win_ok?'var(--g)':'var(--r)',fontWeight:600}}>
                        {m.res.win_ok?`+${calcWinPts(m.pick.winner===game.home?game.home_odds:game.away_odds)} pts`:'✗'}
                      </div>}
                    </div>
                    {isDone&&<OkBadge ok={m.res.win_ok}/>}
                  </div>
                  {m.pick.scorer&&(()=>{
                    const sp=PLAYERS.find(p=>p.id===m.pick.scorer);
                    return(
                      <div style={{display:'flex',alignItems:'center',gap:6,padding:'6px 10px',borderRadius:'var(--rads)',flex:1,
                        background:isDone?(m.res.scorer_ok?'var(--gb)':'var(--rb)'):'var(--dk2)',
                        border:`1px solid ${isDone?(m.res.scorer_ok?'rgba(34,197,94,.2)':'rgba(239,68,68,.2)'):'var(--bd)'}`}}>
                        <div style={{width:24,height:24,borderRadius:'50%',flexShrink:0,
                          background:`${TEAMS[sp?.team]?.c1}30`,border:`1px solid ${TEAMS[sp?.team]?.c1}40`,
                          display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:700,color:TEAMS[sp?.team]?.c1}}>
                          {sp?.team}
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:11,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{sp?.short}</div>
                          {isDone&&<div style={{fontSize:10,color:m.res.scorer_ok?'var(--g)':'var(--r)',fontWeight:600}}>
                            {m.res.scorer_ok?`+${calcScorerPts(sp?.rang||6)} pts`:'✗'}
                          </div>}
                        </div>
                        {isDone&&<OkBadge ok={m.res.scorer_ok}/>}
                      </div>
                    );
                  })()}
                </div>
              )}
            </Card>
          );
        })}
      </div>
    </div>
  );
}

/* ════════════════════════════════════════
   PICK FORM — sans joker
════════════════════════════════════════ */
function PickForm({game,pick,onSave,onBack}){
  const [winner,setWinner]=useState(pick?.winner||null);
  const [scorer,setScorer]=useState(pick?.scorer||null);
  const hT=TEAMS[game.home],aT=TEAMS[game.away];
  // Tous les joueurs des deux équipes, par rang
  const homePlayers=PLAYERS.filter(p=>p.team===game.home).sort((a,b)=>a.rang-b.rang);
  const awayPlayers=PLAYERS.filter(p=>p.team===game.away).sort((a,b)=>a.rang-b.rang);
  const wOdds=winner===game.home?game.home_odds:winner===game.away?game.away_odds:null;
  const wPts=wOdds?calcWinPts(wOdds):0;
  const sPl=PLAYERS.find(p=>p.id===scorer);
  const sPts=sPl?calcScorerPts(sPl.rang):0;
  const total=wPts+sPts;
  const canSave=winner&&scorer;

  const StepN=({n,done})=>(
    <span style={{width:20,height:20,borderRadius:'50%',flexShrink:0,
      background:done?'var(--o)':'var(--bd)',display:'inline-flex',alignItems:'center',
      justifyContent:'center',fontSize:10,fontWeight:700,color:done?'white':'var(--tx2)',transition:'background .15s'}}>
      {done?'✓':n}
    </span>
  );

  function PlayerBtn({p}){
    const sel=scorer===p.id;
    const pts=calcScorerPts(p.rang);
    const tCol=TEAMS[p.team]?.c1||'#888';
    const rankColor=p.rang===1?'var(--o)':p.rang<=3?'var(--bl)':p.rang<=6?'var(--j)':'var(--tx3)';
    return(
      <button onClick={()=>setScorer(p.id)} style={{
        display:'flex',alignItems:'center',gap:9,padding:'9px 12px',
        borderRadius:'var(--rads)',marginBottom:5,width:'100%',
        border:`2px solid ${sel?'var(--o)':'var(--bd)'}`,
        background:sel?'var(--ob)':'var(--dk2)',transition:'all .14s',textAlign:'left'}}>
        <div style={{width:32,height:32,borderRadius:'50%',flexShrink:0,
          background:`${tCol}18`,border:`1.5px solid ${tCol}30`,
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:8,fontWeight:800,color:tCol}}>{p.team}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:600,fontSize:12}}>{p.name}</div>
          <div style={{fontSize:10,color:'var(--tx2)',marginTop:1}}>
            Saison {p.ppg} pts/j · PO {p.ppg_po} pts/j
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:2,flexShrink:0}}>
          <span style={{fontSize:10,fontWeight:700,color:rankColor}}>#{p.rang} éq.</span>
          <span style={{fontSize:13,fontWeight:700,color:sel?'var(--o)':'var(--tx2)'}}>+{pts}</span>
        </div>
      </button>
    );
  }

  return(
    <div style={{padding:'16px 15px 100px'}} className="fi">
      <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:5,
        color:'var(--tx2)',marginBottom:13,fontSize:14}}>
        ← Retour
      </button>

      {/* Têtes d'affiche */}
      <Card style={{marginBottom:13,textAlign:'center'}}>
        <div style={{fontSize:10,fontWeight:600,color:'var(--tx2)',marginBottom:10}}>
          {game.series?.round} · {game.game} — Série {game.series?.wins1}–{game.series?.wins2}
        </div>
        <div style={{display:'flex',justifyContent:'space-around',alignItems:'center',gap:8}}>
          {[{code:game.home,odds:game.home_odds},{code:game.away,odds:game.away_odds}].map((opt,i)=>{
            const t=TEAMS[opt.code];
            return(
              <React.Fragment key={opt.code}>
                {i===1&&<div style={{color:'var(--tx3)',fontWeight:700,fontSize:12}}>VS</div>}
                <div style={{flex:1,textAlign:'center'}}>
                  <div style={{display:'flex',justifyContent:'center',marginBottom:5}}>
                    <TeamBadge code={opt.code} size={46}/>
                  </div>
                  <div style={{fontWeight:700,fontSize:12}}>{t?.city}</div>
                  <div style={{fontSize:10,color:'var(--tx2)'}}>Cote {opt.odds}</div>
                  <div style={{fontSize:13,fontWeight:700,color:'var(--o)',marginTop:1}}>+{calcWinPts(opt.odds)} pts</div>
                </div>
              </React.Fragment>
            );
          })}
        </div>
      </Card>

      {/* Stats équipes */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:13}}>
        {[{code:game.home},{code:game.away}].map(({code})=>{
          const t=TEAMS[code];
          const s=game.series;
          const isHome=code===game.home;
          const myWins=isHome?s?.wins1:s?.wins2;
          const theirWins=isHome?s?.wins2:s?.wins1;
          return(
            <div key={code} style={{padding:'10px 11px',borderRadius:'var(--rads)',
              background:'var(--dk2)',border:'1px solid var(--bd)'}}>
              <div style={{fontSize:10,fontWeight:700,color:TEAMS[code]?.c1,marginBottom:7,
                display:'flex',alignItems:'center',gap:5}}>
                <TeamBadge code={code} size={16}/> {t?.abbr}
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:4}}>
                <StatRow l="Saison" v={`#${t?.conf==='Est'?t?.seed_e:t?.seed_w} ${t?.conf}`}/>
                <StatRow l="Bilan" v={`${t?.reg_w}V – ${t?.reg_l}D`}/>
                <StatRow l="Série" v={`${myWins}–${theirWins}`}/>
              </div>
            </div>
          );
        })}
      </div>

      {/* Étape 1 */}
      <div style={{marginBottom:13}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:9,display:'flex',alignItems:'center',gap:6}}>
          <StepN n={1} done={!!winner}/>Qui va gagner ?
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {[{code:game.home,odds:game.home_odds},{code:game.away,odds:game.away_odds}].map(opt=>{
            const t=TEAMS[opt.code];
            const sel=winner===opt.code;
            const pts=calcWinPts(opt.odds);
            return(
              <button key={opt.code} onClick={()=>setWinner(opt.code)} style={{
                padding:13,borderRadius:'var(--rad)',textAlign:'center',
                border:`2px solid ${sel?'var(--o)':'var(--bd)'}`,
                background:sel?'var(--ob)':'var(--dk2)',transition:'all .14s'}}>
                <div style={{display:'flex',justifyContent:'center',marginBottom:6}}>
                  <TeamBadge code={opt.code} size={38}/>
                </div>
                <div style={{fontWeight:700,fontSize:12,marginBottom:5}}>
                  {t?.city} {t?.name}
                </div>
                <div style={{fontSize:10,color:'var(--tx2)',marginBottom:7}}>Cote {opt.odds}</div>
                <div style={{padding:'4px 0',borderRadius:8,
                  background:sel?'var(--o)':'var(--bd)',
                  color:sel?'white':'var(--tx2)',fontSize:14,fontWeight:700}}>
                  +{pts} pts
                </div>
              </button>
            );
          })}
        </div>
      </div>

      {/* Étape 2 */}
      <div style={{marginBottom:13,opacity:winner?1:.3,transition:'opacity .2s',pointerEvents:winner?'auto':'none'}}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:4,display:'flex',alignItems:'center',gap:6}}>
          <StepN n={2} done={!!scorer}/>Meilleur scoreur ?
        </div>
        <div style={{fontSize:10,color:'var(--tx2)',marginBottom:9,display:'flex',gap:8,flexWrap:'wrap'}}>
          {[['#1',10,'var(--o)'],[' #2-3',20,'var(--bl)'],[' #4-6',30,'var(--j)'],['Autres',40,'var(--tx3)']].map(([l,p,c])=>(
            <span key={l} style={{padding:'1px 7px',borderRadius:5,background:`${c}15`,color:c,fontWeight:700,fontSize:10}}>
              {l}→{p}pts
            </span>
          ))}
        </div>
        {homePlayers.length>0&&<>
          <div style={{fontSize:10,fontWeight:700,color:'var(--tx3)',marginBottom:6,
            display:'flex',alignItems:'center',gap:5}}>
            <TeamBadge code={game.home} size={14}/> {hT?.name}
          </div>
          {homePlayers.map(p=><PlayerBtn key={p.id} p={p}/>)}
        </>}
        {awayPlayers.length>0&&<>
          <div style={{fontSize:10,fontWeight:700,color:'var(--tx3)',marginBottom:6,marginTop:9,
            display:'flex',alignItems:'center',gap:5}}>
            <TeamBadge code={game.away} size={14}/> {aT?.name}
          </div>
          {awayPlayers.map(p=><PlayerBtn key={p.id} p={p}/>)}
        </>}
      </div>

      {/* Étape 3 Joker — supprimé */}

      {/* Récap + CTA */}
      {canSave&&(
        <Card style={{marginBottom:11,background:'rgba(255,92,26,.05)',borderColor:'rgba(255,92,26,.18)'}}>
          <SecLabel style={{marginBottom:8}}>Récapitulatif</SecLabel>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
            <span style={{fontSize:12,color:'var(--tx2)'}}>🏆 {TEAMS[winner]?.name}</span>
            <span style={{fontSize:12,fontWeight:700,color:'var(--o)'}}>+{wPts} pts</span>
          </div>
          {scorer&&<div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
            <span style={{fontSize:12,color:'var(--tx2)'}}>🏀 {sPl?.short} (#{sPl?.rang} éq.)</span>
            <span style={{fontSize:12,fontWeight:700,color:'var(--o)'}}>+{sPts} pts</span>
          </div>}
          <Divider m='8px 0'/>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontWeight:700,fontSize:13}}>Potentiel total</span>
            <span className="grot" style={{fontSize:22,fontWeight:900,color:'var(--o)'}}>+{total} pts</span>
          </div>
        </Card>
      )}
      <button disabled={!canSave} onClick={()=>onSave({winner,scorer})} style={{
        width:'100%',padding:15,borderRadius:'var(--rad)',fontWeight:700,fontSize:15,
        background:canSave?'var(--o)':'var(--bd)',color:canSave?'white':'var(--tx3)',
        cursor:canSave?'pointer':'not-allowed',fontFamily:'Space Grotesk,sans-serif',transition:'background .15s'}}>
        {canSave?`Confirmer · Potentiel +${total} pts`:'Choisis vainqueur + scoreur'}
      </button>
    </div>
  );
}

function StatRow({l,v}){
  return(
    <div style={{display:'flex',justifyContent:'space-between'}}>
      <span style={{fontSize:10,color:'var(--tx3)'}}>{l}</span>
      <span style={{fontSize:10,fontWeight:600}}>{v}</span>
    </div>
  );
}

/* ════════════════════════════════════════
   LEAGUES PAGE
════════════════════════════════════════ */
function LeaguesPage({picks,userId}){
  const[leagues,setLeagues]=useState([]);
  const[activeId,setActiveId]=useState(null);
  const[view,setView]=useState('main');
  const[tab,setTab]=useState('rank');
  const[selectedMember,setSelectedMember]=useState(null);
  const[newName,setNewName]=useState('');
  const[joinCode,setJoinCode]=useState('');
  const[joinMsg,setJoinMsg]=useState('');
  const[members,setMembers]=useState([]);
  const[allPicks,setAllPicks]=useState({});
  const[loadingLeague,setLoadingLeague]=useState(true);

  // Charger les ligues de l'utilisateur
  useEffect(()=>{
    if(!userId)return;
    async function load(){
      setLoadingLeague(true);
      const ls=await sbLoadLeagues(userId);
      setLeagues(ls);
      if(ls.length>0)setActiveId(ls[0].id);
      setLoadingLeague(false);
    }
    load();
  },[userId]);

  // Charger les membres quand la ligue active change
  useEffect(()=>{
    if(!activeId)return;
    async function loadMembers(){
      const ms=await sbLoadLeagueMembers(activeId);
      setMembers(ms);
      if(ms.length>0){
        const ap=await sbLoadAllPicks(ms.map(m=>m.id));
        setAllPicks(ap);
      }
    }
    loadMembers();
  },[activeId]);

  const myPts=useMemo(()=>ALL_GAMES.reduce((s,g)=>s+computeResult(g,picks[g.id]).pts,0),[picks]);

  const getMembersRanked=()=>members.map(m=>{
    const isMe=m.id===userId;
    const mp=isMe?picks:(allPicks[m.id]||{});
    const total=ALL_GAMES.reduce((s,g)=>s+computeResult(g,mp[g.id]).pts,0);
    return{
      ...m,
      id:m.id,
      name:m.name,
      avatar:m.name?.slice(0,2).toUpperCase()||'??',
      color:m.avatar_color||'#FF5C1A',
      champion:null,// à ajouter plus tard
      total,
      isMe
    };

  if(selectedMember)return(

    </div>

          background:'var(--c)',border:`1px solid ${joinCode.length>=4?'var(--o)':'var(--bd)'}`,

        <div style={{fontSize:12,color:joinMsg.includes('!')?'var(--g)':'var(--r)',fontWeight:700}}>{joinMsg}</div>
      </Card>}
      <button onClick={async()=>{
        if(joinCode.trim().length<4)return;
        const{league,error}=await sbJoinLeague(userId,joinCode.trim());
        if(error){setJoinMsg('❌ '+error);return;}
        setJoinMsg('✅ Ligue rejointe !');
        const ls=await sbLoadLeagues(userId);
        setLeagues(ls);
        setActiveId(league.id);
        setTimeout(()=>{setView('main');setJoinCode('');setJoinMsg('');},1000);
      }} style={{width:'100%',padding:14,borderRadius:'var(--rad)',
        background:joinCode.trim().length>=4?'var(--o)':'var(--bd)',
        color:joinCode.trim().length>=4?'white':'var(--tx3)',fontWeight:700,fontSize:15,
        fontFamily:'Space Grotesk,sans-serif'}}>
        Rejoindre →
      </button>
    </div>

  const league=leagues.find(l=>l.id===activeId);

          <div style={{fontSize:12,color:'var(--tx2)',marginBottom:14}}>Crée une ligue et invite tes amis !</div>

function MemberProfileSb({member,picks,onBack}){
  const results=useMemo(()=>ALL_GAMES
    .filter(g=>g.status==='finished')
    .map(g=>({game:g,pick:picks[g.id],res:computeResult(g,picks[g.id])}))
  ,[picks]);
  const total=results.reduce((s,x)=>s+x.res.pts,0);
  const withPick=results.filter(x=>x.pick);
  const winOk=withPick.filter(x=>x.res.win_ok).length;
  const scorerOk=withPick.filter(x=>x.pick?.scorer&&x.res.scorer_ok).length;
  const withScorer=withPick.filter(x=>x.pick?.scorer).length;
  const[tab,setTab]=useState('stats');
  return(
    <div style={{padding:'16px 15px 88px'}} className="fi">
      <button onClick={onBack} style={{color:'var(--tx2)',marginBottom:14,fontSize:14}}>← Retour</button>
      <div style={{display:'flex',alignItems:'center',gap:13,marginBottom:16}}>
        <Avi ini={member.avatar} color={member.color} size={50} ring/>
        <div>
          <div className="grot" style={{fontSize:20,fontWeight:700}}>{member.name}</div>
          <div style={{fontSize:11,color:'var(--tx3)',marginTop:1}}>{withPick.length} pronos · {total} pts</div>
        </div>
      </div>
      <div style={{display:'flex',gap:4,background:'var(--dk2)',borderRadius:'var(--rads)',padding:4,marginBottom:13}}>
        {[['stats','Stats'],['history','Historique']].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)} style={{flex:1,padding:'8px 0',borderRadius:'var(--radxs)',fontSize:12,fontWeight:600,
            background:tab===v?'var(--c)':'transparent',color:tab===v?'var(--tx)':'var(--tx2)'}}>
            {l}
          </button>
        ))}
      </div>
      {tab==='stats'&&(
        <div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9,marginBottom:13}}>
            {[
              {label:'Total points',val:total,unit:'pts',color:'var(--o)'},
              {label:'Pronos joués',val:withPick.length,unit:`/ ${results.length}`,color:'var(--bl)'},
              {label:'% Vainqueur',val:withPick.length?Math.round(winOk/withPick.length*100):0,unit:'%',color:'var(--g)'},
              {label:'% Scoreur',val:withScorer?Math.round(scorerOk/withScorer*100):0,unit:'%',color:'var(--j)'},
            ].map(({label,val,unit,color})=>(
              <Card key={label}>
                <div style={{fontSize:10,color:'var(--tx2)',marginBottom:4}}>{label}</div>
                <div style={{display:'flex',alignItems:'baseline',gap:4}}>
                  <span className="grot" style={{fontSize:26,fontWeight:900,color}}>{val}</span>
                  <span style={{fontSize:10,color:'var(--tx3)'}}>{unit}</span>
                </div>
              </Card>
            ))}
          </div>
        </div>
      )}
      {tab==='history'&&(
        <div>
          {[...results].sort((a,b)=>new Date(b.game.date)-new Date(a.game.date)).map(({game,pick,res})=>(
            <Card key={game.id} style={{marginBottom:7}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                <div style={{fontSize:10,color:'var(--tx2)'}}>{game.series?.round} · Match {game.game_num}</div>
                <span style={{fontSize:13,fontWeight:700,color:res.pts>0?'var(--g)':pick?'var(--r)':'var(--tx3)'}}>
                  {pick?(res.pts>0?`+${res.pts} pts`:'0 pt'):'—'}
                </span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:pick?5:0}}>
                <TeamBadge code={game.home} size={20}/>
                <span className="grot" style={{fontWeight:700,fontSize:14,color:game.winner===game.home?'var(--g)':'var(--tx3)'}}>{game.hs}</span>
                <span style={{color:'var(--tx3)'}}>—</span>
                <span className="grot" style={{fontWeight:700,fontSize:14,color:game.winner===game.away?'var(--g)':'var(--tx3)'}}>{game.as}</span>
                <TeamBadge code={game.away} size={20}/>
              </div>
              {pick&&<div style={{display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}}>
                <OkBadge ok={res.win_ok}/>
                <span style={{fontSize:11,color:'var(--tx2)'}}>{TEAMS[pick.winner]?.name}</span>
                {pick.scorer&&<><OkBadge ok={res.scorer_ok}/><span style={{fontSize:11,color:'var(--tx2)'}}>{PLAYERS.find(p=>p.id===pick.scorer)?.short}</span></>}
              </div>}
            </Card>
          ))}
        </div>
      )}
    </div>
  );
}
function RankTab({members,onSelectMember}){
  const podium=['#F59E0B','#9CA3AF','#CD7F32'];
  return(
    <div style={{display:'flex',flexDirection:'column',gap:7}}>
      {members.map((m,i)=>{
        const rank=i+1;const isMe=m.isMe;
        const gap=i>0?members[i-1].total-m.total:0;
        return(
          <Card key={m.id} onClick={()=>onSelectMember(m)}
            style={{borderColor:isMe?'rgba(255,92,26,.28)':'var(--bd)',
            background:isMe?'rgba(255,92,26,.04)':'var(--c)'}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:28,height:28,borderRadius:'50%',flexShrink:0,
                background:rank<=3?`${podium[rank-1]}20`:'var(--dk2)',
                border:`1.5px solid ${rank<=3?podium[rank-1]:'var(--bd)'}`,
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:rank<=3?13:11,fontWeight:700,color:rank<=3?podium[rank-1]:'var(--tx2)'}}>
                {rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':rank}
              </div>
              <Avi ini={m.avatar} color={m.color} size={36}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:5}}>
                  <span style={{fontWeight:isMe?700:600,fontSize:13}}>{m.name}</span>
                  {isMe&&<Pill color='var(--o)' style={{fontSize:9,padding:'1px 5px'}}>Moi</Pill>}
                </div>
                <div style={{fontSize:10,color:'var(--tx2)',marginTop:1}}>
                  {rank>1&&<span style={{color:'var(--tx3)'}}>−{gap} pts</span>}
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div className="grot" style={{fontSize:21,fontWeight:700,
                  color:rank===1?'var(--gold)':isMe?'var(--o)':'var(--tx)'}}>{m.total}</div>
                <div style={{fontSize:9,color:'var(--tx3)'}}>pts</div>
              </div>
            </div>
            <div style={{marginTop:9,height:3,borderRadius:2,background:'var(--bd)'}}>
              <div style={{height:'100%',borderRadius:2,transition:'width .5s',
                background:rank===1?'var(--gold)':isMe?'var(--o)':m.color,
                width:`${Math.round((m.total/(members[0]?.total||1))*100)}%`}}/>
            </div>
          </Card>
        );
      })}
    </div>
  );
}

            <Card key={game.id} style={{marginBottom:7}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:7}}>
                <div>
                  <div style={{fontSize:10,fontWeight:600,color:'var(--tx2)'}}>{game.series?.round} · {game.game}</div>
                  <div style={{fontSize:9,color:'var(--tx3)'}}>
                    {new Date(game.date+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long'})}
                  </div>
                </div>
                <span style={{fontSize:13,fontWeight:700,
                  color:res.pts>0?'var(--g)':pick?'var(--r)':'var(--tx3)'}}>
                  {pick?(res.pts>0?`+${res.pts} pts`:'0 pt'):'—'}
                </span>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:pick?6:0}}>
                <TeamBadge code={game.home} size={22}/>
                <span className="grot" style={{fontWeight:700,fontSize:15,
                  color:game.winner===game.home?'var(--g)':'var(--tx3)'}}>{game.hs}</span>
                <span style={{color:'var(--tx3)'}}>—</span>
                <span className="grot" style={{fontWeight:700,fontSize:15,
                  color:game.winner===game.away?'var(--g)':'var(--tx3)'}}>{game.as}</span>
                <TeamBadge code={game.away} size={22}/>
                {game.top_scorer&&<span style={{fontSize:10,color:'var(--gold)',marginLeft:4}}>
                  🏀 {PLAYERS.find(p=>p.id===game.top_scorer)?.short} {game.top_pts}pts
                </span>}
              </div>
              {pick&&(
                <div style={{display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}}>
                  <OkBadge ok={res.win_ok}/>
                  <span style={{fontSize:11,color:'var(--tx2)'}}>{TEAMS[pick.winner]?.name}</span>
                  {pick.scorer&&<>
                    <OkBadge ok={res.scorer_ok}/>
                    <span style={{fontSize:11,color:'var(--tx2)'}}>{PLAYERS.find(p=>p.id===pick.scorer)?.short}</span>
                  </>}
                </div>
              )}
            </Card>
          ))}
        </div>
      )}

      {/* ── Déconnexion ── */}
      <div style={{marginTop:24,paddingTop:16,borderTop:'1px solid var(--bd)'}}>
        <button onClick={onLogout} style={{
          width:'100%',padding:'11px 0',borderRadius:'var(--rads)',fontSize:12,fontWeight:700,
          background:'var(--rb)',color:'var(--r)',border:'1px solid rgba(239,68,68,.2)',
          letterSpacing:.3}}>
          Se déconnecter
        </button>
        <div style={{fontSize:10,color:'var(--tx3)',textAlign:'center',marginTop:8}}>
          Tes pronos sont sauvegardés localement
        </div>
      </div>
    </div>
  );
}

// ── Auth ───────────────────────────────────
async function sbSignInGoogle(){

    provider:'google',

  });
  if(error)console.error(error);

async function sbSignInEmail(email,password){
  const{data,error}=await sb.auth.signInWithPassword({email,password});
  return{user:data?.user,error};

async function sbSignUpEmail(email,password,name){
  const{data,error}=await sb.auth.signUp({email,password});

// ── Picks ──────────────────────────────────
async function sbLoadPicks(userId){
  const{data}=await sb.from('picks').select('*').eq('user_id',userId);
  if(!data||data.length===0)return{};
  return data.reduce((acc,p)=>{
    acc[p.game_id]={winner:p.winner,scorer:p.scorer};
    return acc;
  },{});
}

async function sbSavePick(userId,gameId,winner,scorer){
  await sb.from('picks').upsert(
    {user_id:userId,game_id:gameId,winner,scorer,updated_at:new Date().toISOString()},
    {onConflict:'user_id,game_id'}
  );
}

// ── Champion ───────────────────────────────
async function sbLoadChampion(userId){
  const{data}=await sb.from('champion_picks').select('team_code').eq('user_id',userId).maybeSingle();
  return data?.team_code||null;
}

async function sbSaveChampion(userId,teamCode){
  await sb.from('champion_picks').upsert({user_id:userId,team_code:teamCode});
}

// ── Ligues ─────────────────────────────────
async function sbLoadLeagues(userId){
  const{data}=await sb
    .from('league_members')
    .select('league_id, leagues(id,name,code,created_by)')
    .eq('user_id',userId);
  if(!data)return[];
  return data.map(r=>r.leagues).filter(Boolean);
}

async function sbCreateLeague(userId,name,code){
  const{data,error}=await sb.from('leagues').insert({name,code,created_by:userId}).select().single();
  if(error||!data)return null;
  await sb.from('league_members').insert({league_id:data.id,user_id:userId});
  return data;
}

async function sbJoinLeague(userId,code){
  const{data:league}=await sb.from('leagues').select('*').eq('code',code.toUpperCase()).maybeSingle();
  if(!league)return{error:'Code invalide'};
  const{error}=await sb.from('league_members').upsert({league_id:league.id,user_id:userId});
  if(error)return{error:'Déjà membre ou erreur'};
  return{league};
}

async function sbLoadLeagueMembers(leagueId){
  const{data}=await sb
    .from('league_members')
    .select('user_id, users(id,name,avatar_color)')
    .eq('league_id',leagueId);
  if(!data)return[];
  return data.map(r=>r.users).filter(Boolean);
}

async function sbLoadAllPicks(userIds){
  const{data}=await sb.from('picks').select('*').in('user_id',userIds);
  if(!data)return{};
  // {userId: {gameId: {winner,scorer}}}
  return data.reduce((acc,p)=>{
    if(!acc[p.user_id])acc[p.user_id]={};
    acc[p.user_id][p.game_id]={winner:p.winner,scorer:p.scorer};
    return acc;
  },{});
}

/* ════════════════════════════════════════
   APP — version Supabase
════════════════════════════════════════ */
function App(){
  const[authUser,setAuthUser]=useState(null);
  const[loading,setLoading]=useState(true);
  const[page,setPage]=useState('home');
  const[picks,setPicks]=useState({});
  const[championPick,setChampionPick]=useState(null);
  const[defaultDetail,setDefaultDetail]=useState(null);
  const[defaultPickGame,setDefaultPickGame]=useState(null);
  const[toast,setToast]=useState(null);
  const showToast=useCallback(m=>setToast(m),[]);

  // ── Écouter la session Supabase ────────────
  useEffect(()=>{
    const{data:{subscription}}=sb.auth.onAuthStateChange(async(event,session)=>{
      if(session?.user){
        const u=session.user;
        // Charger ou créer le profil
        let{data:profile}=await sb.from('users').select('*').eq('id',u.id).maybeSingle();
        if(!profile){
          const name=u.user_metadata?.full_name||u.email?.split('@')[0]||'Joueur';
          await sb.from('users').upsert({id:u.id,name});
          profile={id:u.id,name};
        }
        setAuthUser({...u,name:profile.name,avatar_color:profile.avatar_color||'#FF5C1A'});
        // Charger picks + champion en parallèle
        const[p,c]=await Promise.all([sbLoadPicks(u.id),sbLoadChampion(u.id)]);
        setPicks(p);
        setChampionPick(c);
      } else {
        setAuthUser(null);
        setPicks({});
        setChampionPick(null);
      }
      setLoading(false);
    });
    return()=>subscription.unsubscribe();
  },[]);

  // ── Sauvegarder un pick ────────────────────
  const handleSetPicks=useCallback((updater)=>{
    setPicks(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      return next;
    });
  },[]);

  const handleSavePick=useCallback(async(gameId,winner,scorer)=>{
    if(!authUser)return;
    setPicks(prev=>({...prev,[gameId]:{winner,scorer}}));
    await sbSavePick(authUser.id,gameId,winner,scorer);
  },[authUser]);

  // ── Sauvegarder le champion ────────────────
  const handleSetChampion=useCallback(async(teamCode)=>{
    if(!authUser)return;
    setChampionPick(teamCode);
    await sbSaveChampion(authUser.id,teamCode);
  },[authUser]);

  // ── Déconnexion ────────────────────────────
  const handleLogout=useCallback(async()=>{
    await sbSignOut();
    setPage('home');
  },[]);

  if(loading)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
      flexDirection:'column',gap:12}}>
      <div style={{fontSize:40}}>🏀</div>
      <div style={{fontSize:13,color:'var(--tx2)'}}>Chargement...</div>
    </div>
  );

  if(!authUser)return <LoginPageSb/>;

  // Wrapper setPicks qui save aussi en base
  const setPicsWrapped=(updaterOrObj)=>{
    if(typeof updaterOrObj==='function'){
      setPicks(prev=>{
        const next=updaterOrObj(prev);
        // Trouver le nouveau pick et le sauvegarder
        Object.entries(next).forEach(([gid,pk])=>{
          if(JSON.stringify(prev[gid])!==JSON.stringify(pk)){
            sbSavePick(authUser.id,gid,pk.winner,pk.scorer);
          }
        });
        return next;
      });
    } else {
      Object.entries(updaterOrObj).forEach(([gid,pk])=>{
        if(JSON.stringify(picks[gid])!==JSON.stringify(pk)){
          sbSavePick(authUser.id,gid,pk.winner,pk.scorer);
        }
      });
      setPicks(updaterOrObj);
    }
  };

  return(
    <div style={{maxWidth:430,margin:'0 auto',minHeight:'100vh',position:'relative'}}>
      {toast&&<Toast msg={toast} onDone={()=>setToast(null)}/>}
      <div style={{paddingBottom:64}}>
        {page==='home'&&<HomePage picks={picks} championPick={championPick}
          setChampionPick={handleSetChampion} toast={showToast} setPage={setPage} user={authUser}
          setDetailGame={id=>{setDefaultDetail(id);setPage('matches');}}
          setPickGame={id=>{setDefaultPickGame(id);setPage('matches');}}/>}
        {page==='matches'&&<MatchesPage picks={picks} setPicks={setPicsWrapped} toast={showToast}
          defaultDetail={defaultDetail} clearDefaultDetail={()=>setDefaultDetail(null)}
          defaultPickGame={defaultPickGame} clearDefaultPickGame={()=>setDefaultPickGame(null)}/>}
        {page==='leagues'&&<LeaguesPage picks={picks} userId={authUser?.id}/>}
        {page==='profile'&&<ProfilePage picks={picks} championPick={championPick}
          setChampionPick={handleSetChampion} toast={showToast} user={authUser} onLogout={handleLogout}/>}
      </div>
      <Nav page={page} setPage={setPage}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
